# upstream definitions
upstream app_servers {
    server app:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name windwatch.analytics;

    # Redirect all HTTP traffic to HTTPS (Production Standard)
    # return 301 https://$host$request_uri;
    
    # Static files directory
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" always;

    # Static assets serving
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API request routing to backend server
    location /api/ {
        proxy_pass http://app_servers;
        proxy_redirect off;
        
        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers forwarding client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Custom error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
