name: WindWatch CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name format: ghcr.io/owner/repo-name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Using the automatic GitHub Action token to authenticate to GHCR
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Target VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH CD Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            # 1. Log in to GitHub Container Registry on the hosting VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Pull the latest image from GHCR
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            
            # 3. Stop the active container if running
            docker stop windwatch-app || true
            
            # 4. Remove the old container if exists
            docker rm windwatch-app || true
            
            # 5. Spin up the new container instance
            docker run -d \
              --name windwatch-app \
              -p 80:80 \
              --restart always \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
            
            # 6. Clean up obsolete dangling docker images
            docker image prune -f
